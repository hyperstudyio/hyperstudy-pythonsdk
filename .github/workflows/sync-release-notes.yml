name: Sync Release Notes to Docs

on:
  release:
    types: [published]

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Get release info
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          BODY=$(gh release view "$TAG" --repo ${{ github.repository }} --json body -q '.body')
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Checkout hyperstudy-docs
        uses: actions/checkout@v4
        with:
          repository: hyperstudyio/hyperstudy-docs
          token: ${{ secrets.DOCS_REPO_TOKEN }}
          path: docs-repo

      - name: Create release notes
        run: |
          cd docs-repo
          TAG="${{ steps.release.outputs.tag }}"
          DIR="docs/release-notes/python-sdk"
          FILE="$DIR/${TAG}.md"

          mkdir -p "$DIR"

          cat > "$FILE" << EOF
          ---
          title: Python SDK ${TAG}
          ---

          # Python SDK ${TAG}

          Released: $(date -u +"%Y-%m-%d")

          ${{ steps.release.outputs.body }}
          EOF

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' "$FILE"

      - name: Commit and push
        run: |
          cd docs-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/release-notes/
          git commit -m "Add Python SDK ${{ steps.release.outputs.tag }} release notes" || exit 0
          git push
